kind = "web"
previewPath = "/"
title = "Arxiv Copilot"
version = "1.0.0"
id = "artifacts/arxiv-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23645

[services.development]
run = "pnpm --filter @workspace/arxiv-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arxiv-copilot", "run", "build" ]
publicDir = "artifacts/arxiv-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23645"
BASE_PATH = "/"
