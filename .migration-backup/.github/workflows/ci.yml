name: ci
on:
  pull_request:
  push:
    branches: [main, work]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r apps/backend/requirements.txt
      - run: PYTHONPATH=apps/backend pytest apps/backend/tests
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npm --workspace apps/frontend run build
  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/backend/Dockerfile -t arxiv-copilot-backend .
      - run: docker build -f apps/frontend/Dockerfile -t arxiv-copilot-frontend .
