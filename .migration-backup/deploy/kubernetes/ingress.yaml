apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arxiv-copilot
  namespace: arxiv-copilot
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [app.arxivcopilot.ai, api.arxivcopilot.ai]
      secretName: arxiv-copilot-tls
  rules:
    - host: app.arxivcopilot.ai
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: frontend, port: { number: 3000 } } } }] }
    - host: api.arxivcopilot.ai
      http: { paths: [{ path: /, pathType: Prefix, backend: { service: { name: backend, port: { number: 8000 } } } }] }
