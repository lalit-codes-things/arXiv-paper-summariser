apiVersion: apps/v1
kind: Deployment
metadata:
  name: arxiv-worker
  namespace: arxiv-platform
  labels:
    app.kubernetes.io/name: arxiv-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: arxiv-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arxiv-worker
        app.kubernetes.io/part-of: arxiv-summariser
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      serviceAccountName: arxiv-worker
      containers:
        - name: worker
          image: ghcr.io/example/arxiv-paper-summariser-worker:v17
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: arxiv-platform-config
          env:
            - name: QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: arxiv-queue
                  key: url
            - name: MODEL_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arxiv-model-provider
                  key: api-key
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
