apiVersion: apps/v1
kind: Deployment
metadata:
  name: arxiv-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: worker
    {{- include "arxiv.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/name: {{ include "arxiv.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        {{- include "arxiv.labels" . | nindent 8 }}
    spec:
      serviceAccountName: arxiv-worker
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.worker.image }}"
          envFrom:
            - configMapRef:
                name: arxiv-platform-config
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
