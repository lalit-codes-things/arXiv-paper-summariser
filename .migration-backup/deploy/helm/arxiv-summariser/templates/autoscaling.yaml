apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arxiv-api
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arxiv-api
  minReplicas: {{ .Values.api.minReplicas }}
  maxReplicas: {{ .Values.api.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: arxiv-worker-queue
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    name: arxiv-worker
  minReplicaCount: {{ .Values.worker.minReplicas }}
  maxReplicaCount: {{ .Values.worker.maxReplicas }}
  triggers:
    - type: redis
      metadata:
        addressFromEnv: QUEUE_URL
        listName: {{ .Values.worker.queueName | quote }}
        listLength: "25"
