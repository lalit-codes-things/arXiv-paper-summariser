apiVersion: apps/v1
kind: Deployment
metadata:
  name: arxiv-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: api
    {{- include "arxiv.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/name: {{ include "arxiv.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        {{- include "arxiv.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: {{ .Values.observability.prometheusScrape | quote }}
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: arxiv-api
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image }}"
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: arxiv-platform-config
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
