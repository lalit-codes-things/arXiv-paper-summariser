groups:
  - name: arxiv-copilot-slo
    rules:
      - alert: BackendDown
        expr: up{job="arxiv-copilot-backend"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: Backend API is unavailable
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: Backend error rate is above 5 percent
