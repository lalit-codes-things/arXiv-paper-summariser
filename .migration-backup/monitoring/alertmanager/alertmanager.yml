route:
  receiver: platform-oncall
  group_by: [alertname, service, tenant]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="page"
      receiver: pagerduty
    - matchers:
        - severity="ticket"
      receiver: ticketing

receivers:
  - name: platform-oncall
    webhook_configs:
      - url: http://incident-router.monitoring.svc/alerts
  - name: pagerduty
    webhook_configs:
      - url: http://incident-router.monitoring.svc/pagerduty
  - name: ticketing
    webhook_configs:
      - url: http://incident-router.monitoring.svc/tickets
