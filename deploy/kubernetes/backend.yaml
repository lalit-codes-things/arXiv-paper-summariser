apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: arxiv-copilot
spec:
  replicas: 3
  selector: { matchLabels: { app: backend } }
  template:
    metadata: { labels: { app: backend } }
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/arxiv-copilot-backend:latest
          ports: [{ containerPort: 8000 }]
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: arxiv-copilot-secrets, key: jwt-secret } }
          readinessProbe: { httpGet: { path: /healthz, port: 8000 }, initialDelaySeconds: 5, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: arxiv-copilot
spec:
  selector: { app: backend }
  ports: [{ port: 8000, targetPort: 8000 }]
