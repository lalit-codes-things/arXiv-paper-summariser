apiVersion: v1
kind: ServiceAccount
metadata:
  name: arxiv-api
  namespace: arxiv-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arxiv-worker
  namespace: arxiv-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-reader
  namespace: arxiv-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
