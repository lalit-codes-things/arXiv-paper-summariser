apiVersion: apps/v1
kind: Deployment
metadata:
  name: arxiv-api
  namespace: arxiv-platform
  labels:
    app.kubernetes.io/name: arxiv-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: arxiv-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arxiv-api
        app.kubernetes.io/part-of: arxiv-summariser
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      serviceAccountName: arxiv-api
      containers:
        - name: api
          image: ghcr.io/example/arxiv-paper-summariser-api:v17
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: arxiv-platform-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: arxiv-database
                  key: url
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: arxiv-sso
                  key: client-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
