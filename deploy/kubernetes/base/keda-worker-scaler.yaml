apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: arxiv-worker-queue
  namespace: arxiv-platform
spec:
  scaleTargetRef:
    name: arxiv-worker
  minReplicaCount: 2
  maxReplicaCount: 50
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: redis
      metadata:
        addressFromEnv: QUEUE_URL
        listName: summarisation-jobs
        listLength: "25"
