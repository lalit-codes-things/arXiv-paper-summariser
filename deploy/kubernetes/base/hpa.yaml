apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arxiv-api
  namespace: arxiv-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arxiv-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "50"
