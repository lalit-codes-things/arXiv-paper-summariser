apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: arxiv-copilot
spec:
  replicas: 3
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/arxiv-copilot-frontend:latest
          ports: [{ containerPort: 3000 }]
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.arxivcopilot.ai
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: arxiv-copilot
spec:
  selector: { app: frontend }
  ports: [{ port: 3000, targetPort: 3000 }]
