[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "arxiv-paper-summariser"
version = "9.0.0"
description = "Convert research papers into executable implementation workflows."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "arXiv Paper Summariser Team" }]
license = { text = "MIT" }
keywords = ["arxiv", "paper", "implementation", "pytorch", "reproducibility"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

[project.scripts]
arxiv-v9 = "arxiv_paper_summariser.v9.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
