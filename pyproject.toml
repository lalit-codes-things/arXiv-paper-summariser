[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "arxiv-paper-summariser"
version = "12.0.0"
description = "V12 global interconnected AI research knowledge graph platform"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "arXiv Paper Summariser Team" }]
license = { text = "MIT" }

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
