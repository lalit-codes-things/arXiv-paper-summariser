services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
    ports: ["8000:8000"]
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]
